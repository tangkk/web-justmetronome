<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JustMetronome</title>
    <meta name="description" content="JustMetronome web app" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="device-shell">
      <main class="app">
      <div class="timer-bar">
        <div id="focusTimerDisplay" class="timer-display">25:00</div>
        <div class="timer-actions">
          <button id="focusTimerStartPause" class="ghost-btn timer-btn">Start</button>
          <button id="focusTimerReset" class="ghost-btn timer-btn">Reset</button>
        </div>
      </div>

      <div class="prefs-row">
        <button id="playStateBtn" class="icon-btn sound-btn" aria-label="Change sound">⍥</button>
        <button id="prefsResetBtn" class="icon-btn reset-btn" aria-label="Reset preferences">⌾</button>
      </div>

      <section class="tempo-stage">
        <svg class="progress-ring" viewBox="0 0 220 220" aria-hidden="true">
          <circle class="ring-track" cx="110" cy="110" r="92"></circle>
          <circle class="ring-progress" id="ringProgress" cx="110" cy="110" r="92"></circle>
        </svg>
        <button id="tempoButton" class="tempo-button" aria-label="Start or stop metronome"></button>
        <div id="tempoField" class="tempo-field">120</div>
      </section>

      <section class="stepper-row" aria-label="Number of beats">
        <button id="beatsMinusBtn" class="stepper-btn" aria-label="Decrease number of beats">−</button>
        <button id="beatsPlusBtn" class="stepper-btn" aria-label="Increase number of beats">+</button>
      </section>

      <section id="beatStack" class="beat-stack primary-row" aria-label="Beat row 1"></section>
      <section id="beatOptStack" class="beat-stack secondary-row" aria-label="Beat row 2"></section>

      <div class="bottom-tools">
        <label class="volume-control">
          <input id="volumeSlider" type="range" min="0" max="2" step="0.01" value="1" />
        </label>
      </div>

      <div id="playHint" class="play-hint"></div>
    </main>
    </div>

    <script type="module" src="./script.js"></script>
  </body>
</html>
